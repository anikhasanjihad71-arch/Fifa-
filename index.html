  <style>
    :root {
      --bg-deep:    #080B14;
      --bg-card:    #0E1422;
      --bg-panel:   #111827;
      --glass:      rgba(255,255,255,0.03);
      --border:     rgba(255,255,255,0.06);
      --accent:     #FF6A00; 
      --accent2:    #FF8C42;
      --accent-glow:rgba(255,106,0,0.35);
      --text-prime: #F0F4FF;
      --text-muted: #8A99B5;
      --text-dim:   #4A5A7A;
      --live-red:   #FF3B3B;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; background-color: var(--bg-deep) !important; overscroll-behavior: none; }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text-prime); min-height: 100dvh; overflow-x: clip; overscroll-behavior: none; }

    /* গ্লোবাল পপ-আপ অ্যানাউন্সমেন্ট বাগ ফিক্সড (ডিফল্ট ডিসপ্লে সম্পূর্ণ হাইড) */
    #global-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px; }
    #global-popup.show { display: flex; opacity: 1; pointer-events: auto; }
    .popup-box { background: var(--bg-card); border: 1px solid var(--accent); border-radius: 16px; width: 100%; max-width: 400px; position: relative; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1); }
    #global-popup.show .popup-box { transform: scale(1); }
    .popup-close { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: background 0.2s; }
    .popup-close:hover { background: rgba(255,255,255,0.2); }
    .popup-content-area { padding: 30px 20px 20px; text-align: center; color: var(--text-prime); }
    .popup-content-area img { max-width: 100%; border-radius: 8px; margin: 0 auto; display: block; }
    .popup-action-btn { display: inline-block; margin-top: 16px; padding: 10px 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 700; border-radius: 8px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px var(--accent-glow); }
    .popup-action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

    #splash-screen { position: fixed; top: -50vh; bottom: -50vh; left: -50vw; right: -50vw; background: var(--bg-deep); z-index: 9999; transition: opacity 0.6s ease; }
    .splash-loader { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 150px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; transition: opacity 0.3s ease; }
    .splash-progress { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; animation: fillBar 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes fillBar { to { width: 100%; } }

    .splash-content { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0.85); display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; }
    .splash-content.reveal { animation: smoothReveal 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    @keyframes smoothReveal { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.85); filter: blur(4px); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); } }
    .splash-content.netflix-zoom { animation: netflixZoom 0.75s cubic-bezier(0.65, 0.05, 0.15, 1) forwards; }
    @keyframes netflixZoom { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(4.5); filter: blur(6px); } }

    #splash-screen img { width: 180px; height: auto; max-height: 120px; object-fit: contain; filter: drop-shadow(0 0 20px var(--accent-glow)); }

    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events: none; z-index: -1; opacity: 0.6; transform: translateZ(0); will-change: transform; }
    .ambient { position: fixed; pointer-events: none; border-radius: 50%; filter: blur(120px); opacity: 0.12; z-index: -2; transform: translateZ(0); will-change: transform; }
    .ambient-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -150px; }
    .ambient-2 { width: 500px; height: 500px; background: #1A5CFF; bottom: -100px; right: -100px; }

    #app { position: relative; z-index: 1; display: grid; grid-template-rows: auto 1fr auto; height: 100dvh; max-width: 1800px; margin: 0 auto; padding: 0 16px; overflow: hidden; }

    /* PWA Safe Area Fix for Desktop/General */
    header { display: flex; align-items: center; justify-content: space-between; padding: max(8px, env(safe-area-inset-top)) 0 8px; border-bottom: 1px solid var(--border); gap: 16px; }
    .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-wrap img { width: 36px; height: 36px; object-fit: contain; filter: drop-shadow(0 0 12px var(--accent-glow)); }
    .logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em; }
    .logo-text .vibe { color: #E2E8F0; }
    .logo-text .cast { color: var(--accent); }

    .header-status { display: flex; align-items: center; gap: 12px; flex: 1; justify-content: flex-end; min-width: 0; }
    .live-indicator { display: flex; align-items: center; gap: 8px; background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: var(--text-dim); font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.8rem; padding: 4px 12px; border-radius: 999px; max-width: 100%; transition: all 0.3s ease; min-width: 0; }
    .live-indicator.active { background: rgba(255,59,59,0.08); border-color: rgba(255,59,59,0.3); color: var(--text-prime); }
    .live-indicator .now-playing-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: all 0.3s; }
    .live-indicator.active .live-dot { background: var(--live-red); animation: pulse-dot 1.4s ease-in-out infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

    main { display: grid; grid-template-columns: clamp(280px, 25vw, 420px) 1fr; gap: 20px; padding: 12px 0; align-items: stretch; min-height: 0; }
    
    .player-section { order: 2; display: flex; flex-direction: column; gap: 0; min-width: 0; min-height: 0; } 

    #tv-player { position: relative; width: 100%; flex: 1; min-height: 0; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 0 0 1px var(--border), 0 8px 30px rgba(0,0,0,0.25); cursor: pointer; container-type: inline-size; }
    
    /* ADDED HARDWARE ACCELERATION HERE TO FIX SCROLLING LAG */
    #tv-player video { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; transform: translateZ(0); will-change: transform; }

    #source-switcher-wrap { 
      display: flex; align-items: center; gap: 12px; background: var(--bg-deep); 
      border: 1px solid var(--border); border-radius: 8px; 
      padding: 0 12px; height: 42px; min-height: 42px; 
      margin: 0 0 12px 0; position: relative; overflow-x: auto; overflow-y: hidden; flex-shrink: 0;
      scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch;
    }
    #source-switcher-wrap::-webkit-scrollbar { display: none; }
    
    #source-switcher-wrap::after {
      content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg); pointer-events: none; z-index: 10; opacity: 0;
    }
    #source-switcher-wrap.animate-shine::after { animation: sweep-shine-fast 0.8s ease-in-out forwards; opacity: 1; }
    @keyframes sweep-shine-fast { 0% { left: -150%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 250%; opacity: 0; } }

    .server-label { 
      display: flex; align-items: center; gap: 4px; font-size: 0.65rem; font-weight: 800; 
      color: #E2E8F0; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; 
      padding-right: 12px; border-right: 1px solid rgba(255,255,255,0.1); height: auto; white-space: nowrap;
    }
    
    #btn-refresh-stream { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid transparent; transition: all 0.2s; cursor: pointer; }
    #btn-refresh-stream:hover { background: rgba(255,255,255,0.15); color: #FFFFFF; }

    #bottom-source-switcher { 
      display: flex; flex-wrap: nowrap; gap: 8px; 
      align-items: center; flex-shrink: 0; height: 100%; 
    }
    #bottom-source-switcher::after { content: ''; display: block; flex: 0 0 12px; width: 12px; }
    
    .source-pill { 
      padding: 0 14px; height: 28px; border-radius: 6px; 
      background: rgba(255,255,255,0.05); border: 1px solid transparent; 
      color: #CBD5E1; font-size: 0.75rem; font-weight: 600; 
      cursor: pointer; transition: all 0.2s ease; display: flex; 
      align-items: center; flex-shrink: 0; white-space: nowrap; 
    }
    .source-pill:hover { background: rgba(255,255,255,0.1); color: #FFFFFF; }
    .source-pill.active { 
      background: rgba(255,255,255,0.25); 
      color: #FFFFFF; 
      font-weight: 800; 
      border: 1px solid transparent; 
    }
    .srv-name { max-width: 200px; overflow: hidden; text-overflow: ellipsis; }

    .player-idle { position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #000; transition: opacity 0.4s; padding: 20px; text-align: center; }
    .player-idle.hidden { opacity: 0; pointer-events: none; }
    .idle-icon { width: clamp(60px, 10cqi, 120px); height: clamp(60px, 10cqi, 120px); border-radius: 50%; background: rgba(255,106,0,0.1); border: 1px solid rgba(255,106,0,0.2); display: flex; align-items: center; justify-content: center; font-size: clamp(1.5rem, 4cqi, 3.5rem); color: var(--accent); margin-bottom: 4px; }
    .idle-text { color: var(--text-muted); font-size: clamp(0.9rem, 2.5cqi, 1.6rem); font-weight: 500; }
    .idle-caution { color: var(--text-dim); font-size: clamp(0.75rem, 1.5cqi, 1.1rem); display: flex; align-items: center; gap: 6px; }

    .player-loading { position: absolute; inset: 0; z-index: 6; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; transition: opacity 0.4s ease; }
    .player-loading.hidden { opacity: 0; pointer-events: none; }
    #loading-logo { width: clamp(70px, 12cqi, 180px); height: clamp(70px, 12cqi, 180px); object-fit: contain; filter: drop-shadow(0 0 15px var(--accent-glow)); transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.8s ease; transform: scale(0.6); opacity: 0; margin-top: -12px; }
    #loading-logo.animate-in { transform: scale(1.2); opacity: 1; }
    #loading-logo.zoom-out { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease; transform: scale(2.5); opacity: 0; }
    #loading-skip-msg { position: absolute; z-index: 10; color: var(--text-prime); font-size: clamp(0.85rem, 2.5cqi, 1.2rem); text-align: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    #loading-skip-msg.show { opacity: 1; }
    #loading-skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, #0a0e17 25%, #151d2e 50%, #0a0e17 75%); background-size: 400% 100%; animation: skeleton-shimmer 1.5s infinite linear; opacity: 0; transition: opacity 0.6s ease; }
    #loading-skeleton.show { opacity: 1; }
    
    /* Global Skeleton Animation */
    @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Skeleton Loading Cards for Channels & Events */
    .skeleton-card { width: 100%; min-height: 80px; border-radius: 10px; background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.02) 75%); background-size: 400% 100%; animation: skeleton-shimmer 1.5s infinite linear; }
    .skeleton-event { width: 100%; min-height: 140px; border-radius: 16px; background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.02) 75%); background-size: 400% 100%; animation: skeleton-shimmer 1.5s infinite linear; margin-bottom: 10px; }

    /* Dynamic Slots for Auto Search Button */
    #auto-search-top-slot {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #auto-search-top-slot.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #auto-search-top-slot #auto-search-wrap {
      background: rgba(8, 11, 20, 0.7);
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
    }
    #auto-search-top-slot .auto-search-label {
      display: inline-block !important;
    }
    #auto-search-bottom-slot .auto-search-label {
      display: none;
    }
    @media (min-width: 641px) {
      #auto-search-bottom-slot .auto-search-label {
        display: inline-block;
      }
    }

    /* Custom YouTube-Style Auto Search Toggle */
    .auto-search-wrap { display: flex; align-items: center; gap: 6px; margin-right: 4px; }
    .auto-search-label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.2s; }
    .auto-search-toggle { width: 38px; height: 22px; border-radius: 11px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); position: relative; cursor: pointer; transition: all 0.3s ease; padding: 0 2px; display: flex; align-items: center; flex-shrink: 0; }
    .auto-search-toggle.is-active { background: rgba(255,106,0,0.2); border-color: var(--accent); }
    .auto-search-circle { width: 14px; height: 14px; border-radius: 50%; background: #8A99B5; display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .auto-search-toggle.is-active .auto-search-circle { background: var(--accent); transform: translateX(18px); }
    .auto-search-circle i { font-size: 7px; transition: opacity 0.2s; }
    
    /* Play means OFF, Pause means ON (running automatically) */
    .auto-search-toggle:not(.is-active) .auto-search-circle .play-icon { display: block; color: #fff; }
    .auto-search-toggle:not(.is-active) .auto-search-circle .pause-icon { display: none; }
    .auto-search-toggle.is-active .auto-search-circle .play-icon { display: none; }
    .auto-search-toggle.is-active .auto-search-circle .pause-icon { display: block; color: #fff; }
    
    .auto-search-toggle:hover { background: rgba(255,255,255,0.15); }
    .auto-search-toggle.is-active:hover { background: rgba(255,106,0,0.3); }

    @keyframes switchGlow {
      0%, 100% { box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(255,106,0,0.4); border-color: var(--accent); }
      50% { box-shadow: 0 0 20px var(--accent), 0 0 35px var(--accent); border-color: #fff; }
    }
    .glow-pulse { animation: switchGlow 1.5s infinite !important; border-color: var(--accent) !important; }

    #player-controls { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 20px calc(16px + env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 60%, transparent 100%); display: flex; align-items: center; justify-content: space-between; gap: 12px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 40; }
    #player-controls.visible { opacity: 1; pointer-events: auto; }
    .ctrl-group { display: flex; align-items: center; gap: 10px; }
    
    .control-btn { width: 36px; height: 36px; border-radius: 50%; flex: 0 0 36px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); color: #fff; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px); }
    .control-btn:hover { background: rgba(255,255,255,0.22); transform: scale(1.05); }
    .control-btn.accent-btn { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
    .control-btn.accent-btn:hover { background: var(--accent2); transform: scale(1.08); }

    .vol-wrap { display: flex; align-items: center; gap: 8px; }
    .volume-slider { width: 70px; cursor: pointer; accent-color: var(--accent); -webkit-appearance: none; background: transparent; margin: 0; }
    .volume-slider::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; background: #fff; border-radius: 50%; margin-top: -4px; transition: transform 0.1s; }
    .volume-slider:hover::-webkit-slider-thumb { transform: scale(1.2); }

    .live-sync-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all 0.2s; padding: 6px 12px; border-radius: 6px; margin-left: 4px; letter-spacing: 0.05em; }
    .live-sync-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .live-sync-btn.is-live { color: #fff; }
    .live-sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: all 0.2s; }
    .live-sync-btn.is-live .live-sync-dot { background: var(--live-red); box-shadow: 0 0 8px rgba(255,59,59,0.8); }
    
    .quality-btn { padding: 4px 12px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; flex: 0 0 auto; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
    .quality-btn.active-quality { background: var(--accent); border-color: var(--accent); }
    
    .quality-menu { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: rgba(14, 20, 34, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px; display: flex; flex-direction: column; gap: 4px; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 50; min-width: 80px; transition: opacity 0.2s, transform 0.2s; }
    .quality-menu.hidden { opacity: 0; pointer-events: none; transform: translate(-50%, 10px); }
    .quality-menu-btn { background: none; border: none; color: var(--text-prime); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-align: center; letter-spacing: 0.05em; white-space: nowrap; }
    .quality-menu-btn:hover, .quality-menu-btn.active { background: var(--accent); color: #fff; }

    /* DOUBLE COLUMN responsive layout for quality drop-down menu inside small/short screen heights */
    @media (max-width: 640px), (max-height: 600px) {
      .quality-menu {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        min-width: 150px;
        padding: 8px;
        bottom: calc(100% + 8px);
      }
      .quality-menu-btn {

    .event-card {

  <div id="global-popup">

    function hexToBase64Url(hex) {
      if (!hex || hex.length % 2 !== 0) return '';
      let str = hex.match(/.{1,2}/g).map(byte => String.fromCharCode(parseInt(byte, 16))).join('');
      return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

      document.body.innerHTML = '';

        e.preventDefault(); triggerDefense();
        return;
      }
      switch(e.key.toLowerCase()) {
        case ' ': case 'k': e.preventDefault(); togglePP(); showControls(); showIndicator(); break;
        case 'm': e.preventDefault(); toggleMute(); showControls(); break;
        case 'f': e.preventDefault(); if (document.body.classList.contains('focus-mode')) exitFocus(); else enterFocus(); break;
        case 'arrowup': e.preventDefault(); videoEl.volume = Math.min(1, videoEl.volume + 0.1); if (volumeSlider) volumeSlider.value = videoEl.volume; if (videoEl.volume > 0) { videoEl.muted = false; isMuted = false; } updateMute(isMuted); showControls(); break;

        });
        renderChannels(sortedChannels.filter(c => c.name.toLowerCase().includes(q)));
      }
    }

    function parseM3U(text) {
      const lines = text.split('\n');
      const sourcesMap = new Map();
      let currentName = 'Unknown Source';
      let currentRef = '';
      let currentLogo = '';
      let currentKid = '';
      let currentKey = '';
      let indexCount = 0;

      lines.forEach(raw => {
        const line = raw.trim();
        if (line.startsWith('#EXTINF')) {
          const idx = line.indexOf(',');
          currentName = idx !== -1 ? line.substring(idx+1).trim() : 'Unknown Source';
          const lm = line.match(/tvg-logo="([^"]+)"/);
          currentLogo = lm ? lm[1] : '';
          currentRef = ''; currentKid = ''; currentKey = '';
        } else if (line.startsWith('#EXTVLCOPT:http-referrer=')) {
          currentRef = line.split('=')[1].trim();
        } else if (line.startsWith('#KID:')) { 
          currentKid = line.split(':')[1].trim();
        } else if (line.startsWith('#KEY:')) { 
          currentKey = line.split(':')[1].trim();
        } else if (line.startsWith('http')) {
          if(!sourcesMap.has(currentName)) {
            sourcesMap.set(currentName, { 
              name: currentName, 
              logo: currentLogo,
              originalIndex: indexCount++,
              streams: [] 
            });
          }
          sourcesMap.get(currentName).streams.push({ 
             url: line, 
             referrer: currentRef, 
             kid: currentKid, 
             key: currentKey 
          });
          
          currentName = 'Unknown Source'; 
          currentRef = ''; currentLogo = ''; currentKid = ''; currentKey = '';
        }
      });
      
      allChannels = Array.from(sourcesMap.values());
    }

    function formatTimeRemaining(distance) {
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);
      
      if (days > 0) return `Starts in ${days}d ${hours}h ${minutes}m`;
      if (hours > 0) return `Starts in ${hours}h ${minutes}m ${seconds}s`;
      return `Starts in ${minutes}m ${seconds}s`;
    }
    
    function formatTimeElapsed(distance) {
      const elapsed = Math.abs(distance);
      const hours = Math.floor(elapsed / (1000 * 60 * 60));
      const minutes = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    }

      card.innerHTML = `
        <div class="event-header-stacked">
          <div class="event-meta-row">
            <span class="evt-date"><i class="far fa-calendar-alt mr-1"></i>${localDate}</span>
            <span class="evt-time"><i class="far fa-clock mr-1"></i>${localTime}</span>
          </div>
          <div class="evt-league" title="${event.league}">${event.league}</div>
        </div>
        
        <div class="event-teams">
          <div class="team-col">
            <div class="team-logo-wrap"><img src="${event.teamA_logo}" alt="${event.teamA_name}" onerror="this.style.display='none'"></div>
            <span class="team-name" title="${event.teamA_name}">${event.teamA_name}</span>
          </div>
          <div class="vs-wrapper">
             <div class="vs-line"></div>
             <span class="vs-text vs-badge"><span>VS</span></span>
          </div>
          <div class="team-col">
            <div class="team-logo-wrap"><img src="${event.teamB_logo}" alt="${event.teamB_name}" onerror="this.style.display='none'"></div>

          <div class="countdown-timer" id="timer-${event.id}">
             <i class="far fa-clock"></i> Loading...

      `;
      if (currentPlayId === event.id) {
        card.classList.add('active-event');
      } else {
        card.classList.remove('active-event');
      }

      const timerEl = card.querySelector(`#timer-${event.id}`);
      
      const updateTimer = () => {
        const now = new Date().getTime();
        const distance = eventTimeMs - now;

        const sportStr = (event.sport || '').toLowerCase();
        const leagueStr = (event.league || '').toLowerCase();
        const isFootball = sportStr.includes('football') || sportStr.includes('soccer') || 
                           leagueStr.includes('football') || leagueStr.includes('soccer') || 
                           leagueStr.includes('laliga') || leagueStr.includes('premier');

        const cutoffLimit = isFootball ? (2.2 * 60 * 60 * 1000) : SIX_HOURS_MS;

        if (distance <= -cutoffLimit) {
          timerEl.innerHTML = '<i class="fas fa-check-circle"></i> Match Ended';
          timerEl.className = 'countdown-timer ended';
          card.classList.add('is-ended');

          // ৩ ঘণ্টা পার হওয়া মাত্রই ব্যাকগ্রাউন্ডে স্বয়ংক্রিয় রি-রেন্ডার ট্রিগার
          setTimeout(() => {
            sortAndRender();
          }, 1000);

          return true; 
        } else if (distance < 0) {
          timerEl.innerHTML = `<i class="fas fa-broadcast-tower"></i> LIVE • Started ${formatTimeElapsed(distance)} ago`;
          timerEl.className = 'countdown-timer is-live';
          return false;
        } else {
          timerEl.innerHTML = `<i class="far fa-clock"></i> ${formatTimeRemaining(distance)}`;
          timerEl.className = 'countdown-timer';
          return false;
        }
      };
      
      updateTimer();
      const intId = setInterval(() => { if(updateTimer()) clearInterval(intId); }, 1000);
      activeIntervals.push(intId);

      card.addEventListener('click', () => {
        const UI_Sources = event.sources.map(s => {
          return { name: s.name, streams: s.streams }; 
        });
        playStreamCollection(event.title, UI_Sources, card, true, event.id);
      });
      return card;
    }

    function playStreamCollection(name, sourcesArray, htmlBtnElement, isEventCard = false, eventId = null) {
      currentPlayName = name;
      currentPlayId = isEventCard ? eventId : name; 
      currentSourcesList = sourcesArray;
      currentSourceIndex = 0;
      serversTriedInLoop = 0; 
      
      document.querySelectorAll(isEventCard ? '.event-card' : '.channel-btn').forEach(c => {
         c.classList.remove(isEventCard ? 'active-event' : 'active-channel');
         const pip = c.querySelector('.active-pip');
         if(pip) pip.remove();
      });

      // Auto-find HTML element if not provided
      if (!htmlBtnElement) {
          const selector = isEventCard ? `.event-card[data-id="${CSS.escape(currentPlayId)}"]` : `.channel-btn[data-id="${CSS.escape(name)}"]`;
          htmlBtnElement = document.querySelector(selector);
      }
      
      if (htmlBtnElement) {
        htmlBtnElement.classList.add(isEventCard ? 'active-event' : 'active-channel');
        if(!isEventCard) {
           const pip = document.createElement('div');
           pip.className = 'active-pip'; htmlBtnElement.appendChild(pip);
        }
        // Smoothly scroll the highlighted channel into view!
        htmlBtnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }

      renderBottomSwitcher(sourcesArray);
      
      if(sourcesArray.length > 0 && sourcesArray[0].streams) {
         initPlaybackSequence(sourcesArray[0].streams, name, true);
      } else if (sourcesArray.length > 1) {
         currentSourceIndex = 1;
         initPlaybackSequence(sourcesArray[1].streams, name, true);
      } else {
         showPlayerError("No valid stream links found for this channel.");
      }
    }

    function initPlaybackSequence(streamsArray, displayName, isNewSelection = false) {
      if(!streamsArray || streamsArray.length === 0) {
         executeStreamFallback(true); 
         return;
      }
      
      currentActiveStreams = streamsArray;
      currentStreamIndex = 0; 
      manualRetryCount = 0;
      autoSearchBtn.classList.remove('glow-pulse');
      
      clearTimeout(skipTimeout); clearTimeout(retryTimeout); clearTimeout(loadTimeout); clearInterval(countdownInterval); clearTimeout(textDisplayTimeout);
      
      if (qualityToggleBtn && qualityMenu) {
        qualityToggleBtn.innerHTML = 'AUTO <i class="fas fa-chevron-up ml-1 text-[10px]"></i>'; 
        qualityToggleBtn.style.opacity = '0.5'; 
        qualityToggleBtn.style.pointerEvents = 'none'; 
        qualityMenu.classList.add('hidden');
      }

      // FIX: Instantly hide the big play/pause indicator if it was stuck from a previous pause
      ppIndicator.classList.remove('visible');
      isPlaying = true; // Optimistically set to playing
      updatePP(true);

      let printName = displayName.length > 18 ? displayName.substring(0, 18) + '...' : displayName;
      nowPlayingName.textContent = printName;
      nowPlayingName.title = displayName; 

      liveIndicator.classList.add('active');
      playerIdle.classList.add('hidden');
      triggerLoadAnimation();

      // Ensure Auto Search is globally enabled unless user turned it off explicitly
      if (isNewSelection && !autoSearchToggled) {
        autoSearchEnabled = true; 
      }
      updateAutoSearchUI();

      loadTimeout = setTimeout(() => { 
        if (!isVideoReady) {
          console.warn("Watchdog timeout triggered (20s). Channel stalling. Firing fallback...");
          executeStreamFallback(); 
        }
      }, WATCHDOG_LIMIT_MS);

      attemptStreamPlay(currentActiveStreams[currentStreamIndex]);
    }
        function attemptStreamPlay(streamObj) {
      // 1. Destroy any existing player instances to prevent audio overlap/memory leaks
      if (hls) { hls.destroy(); hls = null; }
      if (dashPlayer) { dashPlayer.destroy(); dashPlayer = null; }
      if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; }
      
      ppIndicator.classList.remove('visible');

      const targetUrl = streamObj.url;
      const targetRef = streamObj.referrer;

      // 2. ROUTE: DASH (.mpd)
      if (targetUrl.includes('.mpd')) {
        dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(videoEl, targetUrl, true);
        
        dashPlayer.on(dashjs.MediaPlayer.events.ERROR, (e) => {
          console.warn("DASH Engine Error. Executing fallback...");
          executeStreamFallback();
        });
        
        dashPlayer.on(dashjs.MediaPlayer.events.PLAYBACK_PLAYING, () => {
           isVideoReady = true; checkHideLoading(); isPlaying = true; updatePP(true);
        });

      // 3. ROUTE: MPEG-TS (.ts)
      } else if (targetUrl.includes('.ts')) {
        if (mpegts.getFeatureList().mseLivePlayback) {
          tsPlayer = mpegts.createPlayer({
            type: 'mse', // MSE routing for raw transport streams
            isLive: true,
            url: targetUrl
          });
          tsPlayer.attachMediaElement(videoEl);
          tsPlayer.load();
          tsPlayer.play().catch(e => console.log('TS Autoplay prevented', e));

          tsPlayer.on(mpegts.Events.ERROR, (e) => {
            console.warn("MPEG-TS Engine Error. Executing fallback...");
            executeStreamFallback();
          });
          
          videoEl.addEventListener('playing', () => {
             isVideoReady = true; checkHideLoading(); isPlaying = true; updatePP(true);
          }, {once: true});
        } else {
          showPlayerError("Browser does not support .ts playback.");
        }

      // 4. ROUTE: HLS (.m3u8) - Your existing logic
      } else if (Hls.isSupported()) {
        const hlsConfig = {
          maxBufferLength: 30,             
          maxMaxBufferLength: 60,          
          maxBufferSize: 60 * 1000 * 1000, 
          backBufferLength: 30,            
          enableWorker: true,  
          liveSyncDurationCount: 3,
          maxLiveSyncPlaybackRate: 1.05,
          liveMaxLatencyDurationCount: 15
        };

        if (targetRef) {
          hlsConfig.xhrSetup = function(xhr, url) {
            xhr.setRequestHeader('x-forwarded-for', targetRef);
          };
        }

        hls = new Hls(hlsConfig);
        hls.loadSource(targetUrl);
        hls.attachMedia(videoEl);
        
        hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
          videoEl.play().catch(e => console.log('Autoplay prevented', e));
          isPlaying = true; updatePP(true);
          renderQualityButtons(data.levels);
        });
        
        hls.on(Hls.Events.ERROR, (_, data) => { 
          if (data.fatal) { 
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                const code = data.response ? data.response.code : 0;
                if (code === 403 || code === 404 || code === 0 || code >= 500) {
                    console.warn(`HLS Fatal Network Drop (Code: ${code}). Instant Failover Triggered.`);
                    executeStreamFallback();
                    return;
                }
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                hls.recoverMediaError(); 
                break;
              default:
                executeStreamFallback(); 
                break;
            }
          }
        });
        
      // 5. ROUTE: Native Safari Fallback
      } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
        videoEl.src = targetUrl;
        videoEl.style.pointerEvents = 'auto';
        
        videoEl.addEventListener('loadedmetadata', () => {
          videoEl.play().catch(e => console.log('Autoplay prevented', e));
          isPlaying = true; updatePP(true);
        }, {once: true});
        
        videoEl.onerror = () => { 
          console.warn("Native Safari playback failed. Instant Failover.");
          executeStreamFallback(); 
        };
      } else {
        showPlayerError("Your browser does not support playing this stream type.");
      }
    }

    function showLoadingMessage(htmlMsg) {
      clearTimeout(textDisplayTimeout);
      let timePassed = Date.now() - animStartTime;
      let delay = Math.max(0, 1200 - timePassed);
      textDisplayTimeout = setTimeout(() => {
        loadingSkipMsg.innerHTML = htmlMsg;
        loadingSkipMsg.classList.add('show');
      }, delay);
    }

    function executeStreamFallback(forceServerSearch = false) {
      clearTimeout(loadTimeout);
      
      if (!forceServerSearch && currentStreamIndex < currentActiveStreams.length - 1) {
          currentStreamIndex++;
          console.log(`Inner link path down. Advancing silently to backup lane: #${currentStreamIndex + 1}...`);
          
          playerLoading.classList.remove('hidden');
          loadingSkel.classList.add('show');
          loadingSkipMsg.classList.remove('show');
          loadingLogo.classList.add('hidden'); 
          
          loadTimeout = setTimeout(() => { 
            if (!isVideoReady) executeStreamFallback(); 
          }, WATCHDOG_LIMIT_MS);

          attemptStreamPlay(currentActiveStreams[currentStreamIndex]);
      } else {
          showPlayerError();
      }
    }

    function showPlayerError(customMessage = null) {
      clearTimeout(skipTimeout); clearTimeout(retryTimeout); clearTimeout(loadTimeout); clearInterval(countdownInterval);
      if (hls) { hls.destroy(); hls = null; }
      if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; } 

      if (customMessage) {
        playerLoading.classList.add('hidden');
        playerIdle.innerHTML = `<div class="idle-icon"><i class="fas fa-exclamation-triangle"></i></div><p class="idle-text">${customMessage}</p><p class="idle-caution">Turn ON Auto Search to find working channels.</p>`;
        playerIdle.classList.remove('hidden');
        return;
      }

      loadingLogo.classList.add('hidden');
      loadingSkel.classList.remove('show');
      playerLoading.classList.remove('hidden');

      if (autoSearchEnabled) {
        // Continuous Round Robin Server Switch Sequence Lookups
        if (currentSourcesList.length > 1 && serversTriedInLoop < currentSourcesList.length - 1) {
          serversTriedInLoop++;
          currentSourceIndex = (currentSourceIndex + 1) % currentSourcesList.length;
          console.log(`Server failed. Round-robin cycling to Server Index Slot: #${currentSourceIndex + 1}...`);
          
          const pills = document.querySelectorAll('.source-pill');
          pills.forEach(p => p.classList.remove('active'));
          if(pills[currentSourceIndex]) pills[currentSourceIndex].classList.add('active');
          
          showLoadingMessage('<i class="fas fa-server" style="margin-bottom: 12px; font-size: 2rem; color: var(--accent);"></i><br>Searching next server...');
          
          let timePassed = Date.now() - animStartTime;
          let delay = Math.max(500, 1200 - timePassed);
          skipTimeout = setTimeout(() => { 
            initPlaybackSequence(currentSourcesList[currentSourceIndex].streams, currentPlayName, false); 
          }, delay);
          return;
        }

        // Exhausted every possible server inside the event tray completely loop loop back
        serversTriedInLoop = 0; 
        if (currentServer === 'ongoing') {
           playerLoading.classList.add('hidden');
           playerIdle.innerHTML = `<div class="idle-icon"><i class="fas fa-exclamation-triangle"></i></div><p class="idle-text">All Servers Offline</p><p class="idle-caution">All available tray servers for this live match are down.</p>`;
           playerIdle.classList.remove('hidden');
        } else {
           showLoadingMessage('<i class="fas fa-forward" style="margin-bottom: 12px; font-size: 2rem; color: var(--accent);"></i><br>Searching next channel profile...');
           let timePassed = Date.now() - animStartTime;
           let delay = Math.max(500, 1200 - timePassed);
           
           skipTimeout = setTimeout(() => { switchChannel(1); }, 2500 + delay);
        }
      } else {
        // Auto Search turned OFF. Countdown retries mechanism.
        if (manualRetryCount < 2) {
          let countdown = 5;
          showLoadingMessage(`<i class="fas fa-redo fa-spin" style="margin-bottom: 12px; font-size: 2rem; color: var(--accent);"></i><br>Stream offline.<br>Retrying in ${countdown}s...`);
          
          countdownInterval = setInterval(() => {
            countdown--;
            if (countdown > 0) { 
              showLoadingMessage(`<i class="fas fa-redo fa-spin" style="margin-bottom: 12px; font-size: 2rem; color: var(--accent);"></i><br>Stream offline.<br>Retrying in ${countdown}s...`); 
            } else { 
              clearInterval(countdownInterval); 
              manualRetryCount++;
              currentStreamIndex = 0; 
              triggerLoadAnimation(); 
              attemptStreamPlay(currentActiveStreams[0]); 
            }
          }, 1000);
        } else {
          let timePassed = Date.now() - animStartTime;
          let delay = Math.max(500, 1200 - timePassed);
          setTimeout(() => {
            playerLoading.classList.add('hidden');
            playerIdle.innerHTML = `<div class="idle-icon"><i class="fas fa-exclamation-triangle"></i></div><p class="idle-text">Stream Offline</p><p class="idle-caution">Turn ON Auto Search to loop search alternative paths automatically.</p>`;
            playerIdle.classList.remove('hidden');
            autoSearchBtn.classList.add('glow-pulse');
          }, delay);
        }
      }
    }

    function checkHideLoading() {
      if (isAnimComplete && isVideoReady) {
        playerLoading.classList.add('hidden');
      }
    }

    function triggerLoadAnimation() {
      const animId = ++currentAnimId;
      isAnimComplete = false;
      isVideoReady = false;
      animStartTime = Date.now();
      
      playerLoading.classList.remove('hidden');
      loadingLogo.style.transition = 'none';
      loadingLogo.classList.remove('zoom-out', 'animate-in', 'hidden');
      loadingSkel.classList.remove('show');
      loadingSkipMsg.classList.remove('show');
      
      void loadingLogo.offsetWidth;
      loadingLogo.style.transition = ''; 
      
      setTimeout(() => { if (animId !== currentAnimId) return; loadingLogo.classList.add('animate-in'); }, 10);
      setTimeout(() => {
        if (animId !== currentAnimId) return;
        loadingLogo.classList.add('zoom-out');
        loadingSkel.classList.add('show');
        setTimeout(() => { if (animId !== currentAnimId) return; isAnimComplete = true; checkHideLoading(); }, 800); 
      }, 1200); 
    }

    // NEW FIX: Pass isDash flag to map settings accurately
    function renderQualityButtons(levels, isDash = false) {
      if (!qualityMenu || !qualityToggleBtn) return;
      qualityMenu.innerHTML = '';
      
      qualityToggleBtn.innerHTML = 'AUTO <i class="fas fa-chevron-up ml-1 text-[10px]"></i>';
      qualityToggleBtn.style.opacity = '1';
      qualityToggleBtn.style.pointerEvents = 'auto';

      if (!levels || levels.length <= 1) {
        qualityToggleBtn.style.opacity = '0.5';
        qualityToggleBtn.style.pointerEvents = 'none';
        return;
      }

      const options = [ { text: 'AUTO', val: -1 } ];

      // Use qualityIndex for DASH or array position for HLS
      let mappedLevels = levels.map((l, i) => ({ 
         originalIndex: isDash ? l.qualityIndex : i, 
         height: l.height 
      }));
      
      mappedLevels.sort((a, b) => b.height - a.height);
      
      const uniqueLevels = [];
      const heights = new Set();
      mappedLevels.forEach(l => {
          if(!heights.has(l.height) && l.height > 0) {
              heights.add(l.height);
              uniqueLevels.push(l);
          }
      });
      uniqueLevels.forEach(l => {
        let resName = `${l.height}p`;
        if (l.height >= 2160) resName = '4K';
        else if (l.height >= 1440) resName = '1440p';
        
        options.push({ text: resName, val: l.originalIndex });
      });

      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'quality-menu-btn';
        if (opt.val === -1) btn.classList.add('active'); 
        btn.dataset.quality = opt.val; 
        btn.textContent = opt.text;
        qualityMenu.appendChild(btn);
        
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          qualityMenu.querySelectorAll('.quality-menu-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          
          qualityToggleBtn.innerHTML = `${opt.text} <i class="fas fa-chevron-up ml-1 text-[10px]"></i>`; 
          qualityMenu.classList.add('hidden');
          
          // Switch qualities depending on current player engine
          if (isDash && dashPlayer) {
              if (opt.val === -1) {
                  dashPlayer.updateSettings({ streaming: { abr: { autoSwitchBitrate: { video: true } } } });
              } else {
                  dashPlayer.updateSettings({ streaming: { abr: { autoSwitchBitrate: { video: false } } } });
                  dashPlayer.setQualityFor("video", opt.val);
              }
          } else if (hls) {
              hls.nextLevel = parseInt(opt.val);
          }
        });
      });
    }

    videoEl.addEventListener('play', () => {
      if (Hls.isSupported() && hls && videoEl.seekable.length > 0) {
        const liveEdge = videoEl.seekable.end(videoEl.seekable.length - 1);
        const delayFromLive = liveEdge - videoEl.currentTime;
        if (delayFromLive > 50) videoEl.currentTime = liveEdge - 3;
      }
    });

    videoEl.addEventListener('timeupdate', () => {
      if (videoEl.seekable.length > 0) {
        const liveEdge = videoEl.seekable.end(videoEl.seekable.length - 1);
        if (liveEdge - videoEl.currentTime <= 15) liveSyncBtn.classList.add('is-live');
        else liveSyncBtn.classList.remove('is-live');
      }
    });

    videoEl.addEventListener('playing', () => {
      isVideoReady = true;
      serversTriedInLoop = 0; 
      clearTimeout(skipTimeout); clearTimeout(retryTimeout); clearTimeout(loadTimeout); clearInterval(countdownInterval); clearTimeout(textDisplayTimeout);
      checkHideLoading();
      
      // Triple-check indicator is gone when video runs
      ppIndicator.classList.remove('visible');
      isPlaying = true;
      updatePP(true);
    });

    function updatePP(playing) { playPauseBtns.forEach(b => b.innerHTML = `<i class="fas ${playing ? 'fa-pause' : 'fa-play'}"></i>`); }
    function updateMute(muted) { 
      let icon = 'fa-volume-up';
      if (muted || videoEl.volume === 0) icon = 'fa-volume-mute';
      else if (videoEl.volume < 0.5) icon = 'fa-volume-down';
      muteBtns.forEach(b => b.innerHTML = `<i class="fas ${icon}"></i>`); 
    }
    
    function togglePP() {
      if (!videoEl.src && !hls?.url && (!dashPlayer || !dashPlayer.isReady())) return;
      videoEl.paused ? videoEl.play() : videoEl.pause();
      isPlaying = !videoEl.paused; updatePP(isPlaying);
    }
    
    function toggleMute() {
      videoEl.muted = !videoEl.muted; isMuted = videoEl.muted; updateMute(isMuted);
      if (volumeSlider) {
        if (isMuted) volumeSlider.value = 0;
        else { volumeSlider.value = videoEl.volume > 0 ? videoEl.volume : 1; if (videoEl.volume === 0) videoEl.volume = 1; }
      }
    }
    
    function showControls() {
      clearTimeout(ctrlTimeout); 
      playerControls.classList.add('visible');
      document.getElementById('auto-search-top-slot').classList.add('visible');
      
      if (body.classList.contains('focus-mode')) {
        sourceSwitcherWrap.classList.add('fs-visible');
      }
      
      if (isPlaying) {
        ctrlTimeout = setTimeout(() => {
          playerControls.classList.remove('visible');
          document.getElementById('auto-search-top-slot').classList.remove('visible');
          sourceSwitcherWrap.classList.remove('fs-visible');
        }, 3000);
      }
    }
    
    function showIndicator() {
      clearTimeout(indTimeout);
      ppIndicator.querySelector('i').className = `fas ${isPlaying ? 'fa-pause' : 'fa-play'}`;
      ppIndicator.classList.add('visible');
      if (isPlaying) indTimeout = setTimeout(() => ppIndicator.classList.remove('visible'), 500);
    }

    // Smart Server Switcher logic
    function switchSource(direction) {
      if (!currentSourcesList || currentSourcesList.length <= 1) {
         switchChannel(direction);
         return;
      }
      
      currentSourceIndex += direction;
      if (currentSourceIndex < 0) currentSourceIndex = currentSourcesList.length - 1;
      if (currentSourceIndex >= currentSourcesList.length) currentSourceIndex = 0;
      
      serversTriedInLoop = 0; 
      
      const pills = document.querySelectorAll('.source-pill');
      pills.forEach((p, idx) => {
        if (idx === currentSourceIndex) p.classList.add('active');
        else p.classList.remove('active');
      });
      
      if (pills[currentSourceIndex]) {
          pills[currentSourceIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
      
      initPlaybackSequence(currentSourcesList[currentSourceIndex].streams, currentPlayName, false);
      showControls(); 
    }

    function switchChannel(direction) {
      if (!currentDisplayList || !currentDisplayList.length) return; 
      
      let currentIdx = currentDisplayList.findIndex(ch => {
          if (currentServer === 'ongoing') {
              return ch.id === currentPlayId;
          } else {
              return ch.name === currentPlayName;
          }
      });
      
      if (currentIdx === -1) currentIdx = 0; 
      
      let newIdx = currentIdx + direction;
      if (newIdx < 0) newIdx = currentDisplayList.length - 1; 
      if (newIdx >= currentDisplayList.length) newIdx = 0; 
      
      const nextCh = currentDisplayList[newIdx];
      
      if(currentServer === 'ongoing') {
         const UI_Sources = nextCh.sources.map(s => { return { name: s.name, streams: s.streams }; });
         playStreamCollection(nextCh.title, UI_Sources, null, true, nextCh.id);
      } else {
         playStreamCollection(nextCh.name, [{ name: 'Primary', streams: nextCh.streams }], null, false);
      }
      showControls(); 
    }

    prevBtn.addEventListener('click', (e) => { e.stopPropagation(); switchSource(-1); });
    nextBtn.addEventListener('click', (e) => { e.stopPropagation(); switchSource(1); });

    liveSyncBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (videoEl.seekable.length > 0) {
        videoEl.currentTime = videoEl.seekable.end(videoEl.seekable.length - 1);
        if (videoEl.paused) togglePP();
        showControls();
      }
    });

    volumeSlider.addEventListener('input', (e) => {
      e.stopPropagation(); videoEl.volume = e.target.value;
      if (videoEl.volume > 0) { videoEl.muted = false; isMuted = false; } 
      else { videoEl.muted = true; isMuted = true; }
      updateMute(isMuted); showControls();
    });

    tvPlayer.addEventListener('click', (e) => {
      if (e.target.closest('.control-btn') || e.target.closest('.quality-btn') || e.target.closest('.quality-menu') || e.target.closest('.vol-wrap') || e.target.closest('.live-sync-btn') || e.target.closest('#auto-search-wrap')) return;
      const isHoverCapable = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      if (!isHoverCapable) {
        if (!playerControls.classList.contains('visible')) showControls();
        else { togglePP(); showControls(); showIndicator(); }
      } else { togglePP(); showIndicator(); }
    });
    
    tvPlayer.addEventListener('mousemove', () => {
      showControls();
      if (body.classList.contains('focus-mode')) {
        tvPlayer.style.cursor = 'default'; clearTimeout(cursorHideTimeout);
        cursorHideTimeout = setTimeout(() => { if (isPlaying) tvPlayer.style.cursor = 'none'; }, 3000);
      } else { tvPlayer.style.cursor = 'pointer'; }
    });

    playerControls.addEventListener('mouseenter', () => { clearTimeout(ctrlTimeout); });
    playerControls.addEventListener('mouseleave', () => { if (isPlaying) showControls(); });
    
    sourceSwitcherWrap.addEventListener('mouseenter', () => { clearTimeout(ctrlTimeout); });
    sourceSwitcherWrap.addEventListener('mouseleave', () => { if (isPlaying) showControls(); });

    document.getElementById('auto-search-top-slot').addEventListener('mouseenter', () => { clearTimeout(ctrlTimeout); });
    document.getElementById('auto-search-top-slot').addEventListener('mouseleave', () => { if (isPlaying) showControls(); });

    function enterFocus() {
      body.classList.add('focus-mode'); 
      maximizeBtn.style.display = 'none'; 
      minimizeBtn.style.display = 'flex'; 
      showControls(); 
      adjustAutoSearchPosition();
      
      const docEl = document.documentElement;
      try {
        if (docEl.requestFullscreen) docEl.requestFullscreen().catch(err => console.warn(err));
        else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
        else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
        else if (videoEl.webkitEnterFullscreen) videoEl.webkitEnterFullscreen(); 
      } catch(e) {}

      setTimeout(() => { window.scrollTo(0, 1); }, 150);
      try {
        if (window.screen && screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      } catch(e) {}
      
      history.pushState({focus:true}, '');
    }
    
    function exitFocus(fromEvent = false) {
      body.classList.remove('focus-mode'); 
      maximizeBtn.style.display = 'flex'; 
      minimizeBtn.style.display = 'none'; 
      playerControls.classList.remove('visible'); 
      document.getElementById('auto-search-top-slot').classList.remove('visible'); 
      sourceSwitcherWrap.classList.remove('fs-visible');
      tvPlayer.style.cursor = 'pointer'; 
      adjustAutoSearchPosition();
      if(qualityMenu) qualityMenu.classList.add('hidden');
      
      try {
        if (window.screen && screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      } catch(e) {}
      
      if (!fromEvent) {
        try {
          if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen().catch(() => {});
          else if (document.webkitExitFullscreen && document.webkitFullscreenElement) document.webkitExitFullscreen();
          else if (document.msExitFullscreen && document.msFullscreenElement) document.msExitFullscreen();
        } catch(e) {}
      }
      
      if (isPlaying && videoEl.paused) videoEl.play().catch(() => {});
    }

    maximizeBtn.addEventListener('click',    (e) => { e.stopPropagation(); enterFocus(); });
    minimizeBtn.addEventListener('click',    (e) => { e.stopPropagation(); exitFocus(); });
    playPauseBtns.forEach(b => b.addEventListener('click', e => { e.stopPropagation(); togglePP(); showControls(); showIndicator(); }));
    muteBtns.forEach(b => b.addEventListener('click', e => { e.stopPropagation(); toggleMute(); showControls(); }));
    
    serverSelect.addEventListener('change', e => {
      if (e.target.value === 'custom') {
        const customUrl = prompt("Enter your .M3U Playlist URL:");
        if (customUrl && customUrl.trim() !== '') {
          currentServer = 'custom'; loadChannels(customUrl.trim());
        } else { e.target.value = currentServer; }
      } else {
        currentServer = e.target.value; loadChannels(e.target.value); 
      }
    });
    
    searchInput.addEventListener('input', sortAndRender);
    window.addEventListener('popstate', () => { if (body.classList.contains('focus-mode')) exitFocus(); });
    document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement && body.classList.contains('focus-mode')) exitFocus(true); });
    document.addEventListener('webkitfullscreenchange', () => { if (!document.webkitFullscreenElement && body.classList.contains('focus-mode')) exitFocus(true); });

    videoEl.addEventListener('webkitendfullscreen', () => {
      exitFocus(true);
      setTimeout(() => { if (isPlaying && videoEl.paused) videoEl.play().catch(e => console.log('iOS resume play prevented', e)); }, 100);
    });

    document.addEventListener('DOMContentLoaded', async () => {
      adjustFooterLayout();
      adjustAutoSearchPosition();
      
      const pSec = document.querySelector('.player-section');
      const sCtrl = document.querySelector('.sidebar-controls');
      if (pSec) layoutObserver.observe(pSec);
      if (sCtrl) layoutObserver.observe(sCtrl);

      await loadCMSData();
      typePlaceholder();
    });
  </script>
</body>
</html>
